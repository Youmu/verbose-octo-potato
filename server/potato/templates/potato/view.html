<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Potato Viewer</title>
    <script>
      function loadBootstrapFallback() {
        var el = document.getElementById('bootstrap-css');
        if (!el || el.dataset.fallbackLoaded === '1') return;
        el.dataset.fallbackLoaded = '1';
        el.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css';
      }
    </script>
    <link
      id="bootstrap-css"
      href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
      onerror="loadBootstrapFallback()"
    />
  </head>
  <body class="bg-light">
    <main class="container py-4">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
          <h1 class="h3 mb-3">Potato Viewer</h1>
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="input-group">
                <input
                  id="pwd"
                  type="password"
                  class="form-control"
                  placeholder="Enter password"
                  autocomplete="current-password"
                  aria-label="Password"
                />
                <button id="submit" class="btn btn-primary" type="button">Submit</button>
              </div>
              <div class="form-text">Decrypts messages from the last 24 hours.</div>
            </div>
          </div>

          <div id="messages" class="mt-3 d-grid gap-2"></div>
        </div>
      </div>
    </main>

    <script>
    const COOKIE_KEY_NAME = 'potato_key';

    async function sha256(text) {
      const enc = new TextEncoder();
      const data = enc.encode(text);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return new Uint8Array(hash);
    }

    async function importKey(raw) {
      return crypto.subtle.importKey('raw', raw, {name: 'AES-CBC'}, false, ['decrypt']);
    }

    function b64ToUint8(b64) {
      const bin = atob(b64);
      const len = bin.length;
      const arr = new Uint8Array(len);
      for (let i = 0; i < len; i++) arr[i] = bin.charCodeAt(i);
      return arr;
    }

    function uint8ToB64(arr) {
      let bin = '';
      for (let i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
      return btoa(bin);
    }

    function getCookie(name) {
      const key = `${name}=`;
      const parts = document.cookie ? document.cookie.split(';') : [];
      for (const partRaw of parts) {
        const part = partRaw.trim();
        if (part.startsWith(key)) {
          return decodeURIComponent(part.substring(key.length));
        }
      }
      return null;
    }

    function setSessionCookie(name, value) {
      document.cookie = `${name}=${encodeURIComponent(value)}; path=/; SameSite=Lax`;
    }

    function formatClientTime(ts) {
      const date = new Date(ts);
      if (Number.isNaN(date.getTime())) return ts;
      const pad2 = (n) => String(n).padStart(2, '0');
      const month = pad2(date.getMonth() + 1);
      const day = pad2(date.getDate());
      const hour = pad2(date.getHours());
      const minute = pad2(date.getMinutes());
      const second = pad2(date.getSeconds());
      return `${month}-${day} ${hour}:${minute}:${second}`;
    }

    function sortMessagesMostRecentFirst(messages) {
      return [...messages].sort((a, b) => {
        const ta = new Date(a?.TimeStamp || 0).getTime();
        const tb = new Date(b?.TimeStamp || 0).getTime();
        if (!Number.isNaN(tb - ta) && tb !== ta) return tb - ta;

        const ia = Number(a?.Index || 0);
        const ib = Number(b?.Index || 0);
        return ib - ia;
      });
    }

    async function resolveKeyFromInputOrCookie() {
      const pwdInput = document.getElementById('pwd');
      const pwd = pwdInput.value || '';

      if (pwd) {
        const keyBytes = await sha256(pwd + 'potato');
        setSessionCookie(COOKIE_KEY_NAME, uint8ToB64(keyBytes));
        return importKey(keyBytes);
      }

      const savedKey = getCookie(COOKIE_KEY_NAME);
      if (!savedKey) return null;
      return importKey(b64ToUint8(savedKey));
    }

    function renderMessage(container, message, text) {
      const item = document.createElement('article');
      item.className = 'card shadow-sm';

      const body = document.createElement('div');
      body.className = 'card-body';

      const header = document.createElement('h2');
      header.className = 'h6 card-subtitle mb-2 text-muted';
      header.textContent = `${formatClientTime(message.TimeStamp)} | ${message.From || ''}`;

      const content = document.createElement('p');
      content.className = 'card-text mb-0';
      content.textContent = text;

      body.appendChild(header);
      body.appendChild(content);
      item.appendChild(body);
      container.appendChild(item);
    }

    function renderInfo(container, text) {
      const info = document.createElement('div');
      info.className = 'alert alert-secondary mb-0';
      info.textContent = text;
      container.appendChild(info);
    }

    async function decryptMessage(key, b64) {
      const data = b64ToUint8(b64);
      const iv = data.slice(0, 16);
      const ct = data.slice(16);
      try {
        const plain = await crypto.subtle.decrypt({name: 'AES-CBC', iv}, key, ct);
        const dec = new TextDecoder().decode(plain);
        return dec;
      } catch (e) {
        return '[decryption failed]';
      }
    }

    (function initPasswordPlaceholder() {
      if (getCookie(COOKIE_KEY_NAME)) {
        document.getElementById('pwd').placeholder = 'Saved key found (enter new password to replace)';
      }
    })();

    document.getElementById('submit').addEventListener('click', async () => {
      const out = document.getElementById('messages');
      out.innerHTML = '';

      try {
        const key = await resolveKeyFromInputOrCookie();
        if (!key) {
          renderInfo(out, 'Enter password at least once to generate and save the key.');
          return;
        }

        const resp = await fetch('/potato/msg');
        if (!resp.ok) {
          renderInfo(out, `Failed to fetch messages: HTTP ${resp.status}`);
          return;
        }

        const json = await resp.json();
        const messages = sortMessagesMostRecentFirst(json.Messages || []);
        if (messages.length === 0) {
          renderInfo(out, 'No messages in the last 24 hours.');
          return;
        }

        for (const m of messages) {
          const text = await decryptMessage(key, m.Data || '');
          renderMessage(out, m, text);
        }
      } catch (err) {
        renderInfo(out, 'Unexpected error while loading messages.');
      }
    });
    </script>
  </body>
</html>
